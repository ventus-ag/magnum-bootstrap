# Butane config for an e2e Fedora CoreOS test node (master or worker).
#
# Rendered to Ignition per-node by run-fcos-e2e.sh, which substitutes:
#   @@SSH_AUTHORIZED_KEY@@  harness-generated public key
#   @@HOSTNAME@@            node hostname (e.g. e2e-master-0, e2e-minion-0)
#   @@CLUSTER_MAC@@         MAC of the cluster NIC (multi-node only)
#   @@CLUSTER_IP@@          static cluster IP, /24 (multi-node only)
#
# Single-node runs attach no cluster NIC, so the MAC-matched NetworkManager
# connection below simply matches nothing and is ignored — harmless. Multi-node
# runs attach a second QEMU socket/mcast NIC with @@CLUSTER_MAC@@, which NM then
# pins to @@CLUSTER_IP@@ to form a shared cluster network across the VMs.
#
# Everything else (containerd, kubelet, control plane) is installed by the
# reconciler, exactly as on a real Magnum node.
variant: fcos
version: 1.5.0
passwd:
  users:
    - name: core
      groups: [sudo, wheel]
      ssh_authorized_keys:
        - "@@SSH_AUTHORIZED_KEY@@"
    - name: root
      ssh_authorized_keys:
        - "@@SSH_AUTHORIZED_KEY@@"
storage:
  # NOTE: no /usr/local or /opt symlink-target pre-creation here. The reconciler's
  # container-runtime module unpacks the containerd bundle to a scratch dir and
  # copies it into /var/usrlocal + /var/opt (never through the read-only /usr
  # overlay), so it installs on a bare Fedora CoreOS image (composefs included)
  # without any node pre-provisioning — exactly as it must on a real Magnum node.
  links:
    # Compat path for the system CA bundle. Real Magnum FCoS nodes have
    # /etc/pki/tls/certs/ca-bundle.crt (the reconciler's kube-os-config copies it
    # into the OpenStack cloud-provider ca-file). A bare FCoS image ships only the
    # extracted bundle, so recreate the standard Fedora symlink here to match a
    # production node — otherwise kube-os-config fails with
    # "open /etc/pki/tls/certs/ca-bundle.crt: no such file or directory".
    - path: /etc/pki/tls/certs/ca-bundle.crt
      target: /etc/pki/ca-trust/extracted/pem/tls-ca-bundle.pem
      overwrite: true
  files:
    - path: /etc/hostname
      mode: 0644
      overwrite: true
      contents:
        inline: "@@HOSTNAME@@"
    - path: /etc/sysctl.d/99-e2e.conf
      mode: 0644
      contents:
        inline: |
          fs.inotify.max_user_watches=1048576
          fs.inotify.max_user_instances=8192
    - path: /etc/ssh/sshd_config.d/30-e2e-root.conf
      mode: 0600
      contents:
        inline: |
          PermitRootLogin prohibit-password
          PubkeyAuthentication yes
    # Match production Magnum nodes, which do NOT run SELinux in enforcing mode
    # (the cluster's selinux_mode default is "disabled" — the driver's
    # fcct-config.yaml writes /etc/selinux/config accordingly). A bare FCoS image
    # boots ENFORCING, under which systemd refuses to load the reconciler-written
    # kube-*.service unit files ("Unit ... does not exist") and confined writes
    # fail. FCoS honors "permissive" from this file on boot ("disabled" is ignored
    # by modern systemd, so use permissive); the e2e-selinux-permissive.service
    # unit below also enforces it at runtime before the reconciler runs.
    - path: /etc/selinux/config
      mode: 0644
      overwrite: true
      contents:
        inline: |
          SELINUX=permissive
          SELINUXTYPE=targeted
    # Cluster network NIC (multi-node). Matched by MAC so interface naming does
    # not matter; ignored when no NIC carries this MAC (single-node).
    - path: /etc/NetworkManager/system-connections/cluster.nmconnection
      mode: 0600
      contents:
        inline: |
          [connection]
          id=cluster
          type=ethernet
          autoconnect=true
          [ethernet]
          mac-address=@@CLUSTER_MAC@@
          [ipv4]
          method=manual
          addresses=@@CLUSTER_IP@@/24
          may-fail=true
          [ipv6]
          method=ignore
systemd:
  units:
    # Disable Fedora CoreOS auto-updates on every node. zincati otherwise stages an
    # OSTree update and reboots the node to finalize it (ostree-finalize-staged),
    # which mid-test resets SSH/etcd and aborts the run — it bit start_lbs when the
    # reconciler-less lb node rebooted. Production already disables this: the
    # reconciler's zincati module honors OS_AUTOUPGRADE_ENABLED=false. Masking in
    # Ignition kills it from first boot (before zincati can run), and covers the lb
    # node and the master/worker boot→first-reconcile window the module can't.
    - name: zincati.service
      mask: true
    # Force SELinux permissive at runtime before the reconciler runs, matching a
    # production Magnum node (selinux_mode "disabled"). The /etc/selinux/config
    # written above takes effect on the next boot; this guarantees the FIRST boot
    # is non-enforcing too, so systemd can load the reconciler-written kube-*
    # unit files and confined operations are not denied.
    - name: e2e-selinux-permissive.service
      enabled: true
      contents: |
        [Unit]
        Description=e2e: set SELinux permissive to match production Magnum nodes
        Before=magnum-reconcile.service
        ConditionSecurity=selinux
        [Service]
        Type=oneshot
        RemainAfterExit=yes
        ExecStart=/usr/sbin/setenforce 0
        [Install]
        WantedBy=multi-user.target
    # Stub for heat-container-agent.service. On a real Magnum node the driver's
    # fcct-config.yaml ships this unit (a podman container that talks to Heat); the
    # reconciler's heat-container-agent phase enables + starts it and waits for it
    # to become active. The mock e2e tier has no Heat and cannot run that image, so
    # provide a no-op unit with the same name that goes active immediately — the
    # reconciler's enable/start/wait then succeeds without weakening its prod
    # behaviour (where the unit is always present).
    - name: heat-container-agent.service
      enabled: true
      contents: |
        [Unit]
        Description=e2e stub for heat-container-agent (real one is Heat/podman infra, absent on the mock tier)
        [Service]
        Type=oneshot
        RemainAfterExit=yes
        ExecStart=/bin/true
        [Install]
        WantedBy=multi-user.target
# NOTE: no kernel_arguments here — this config mirrors the real Magnum
# `fcct-config.yaml`, which carries none. The nested AMD-V (Zen1) workaround kargs
# (idle=poll/nox2apic/no-kvmclock/tsc=reliable/pci=nomsi) are injected by the
# harness (run-fcos-e2e.sh INJECT_KARGS) straight into the image's BLS entry on
# nested AMD only, so a clean/Nova-faithful boot (e.g. QEMU_CPU=host) has none.
