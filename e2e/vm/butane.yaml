# Butane config for an e2e Fedora CoreOS test node (master or worker).
#
# Rendered to Ignition per-node by run-fcos-e2e.sh, which substitutes:
#   @@SSH_AUTHORIZED_KEY@@  harness-generated public key
#   @@HOSTNAME@@            node hostname (e.g. e2e-master-0, e2e-minion-0)
#   @@CLUSTER_MAC@@         MAC of the cluster NIC (multi-node only)
#   @@CLUSTER_IP@@          static cluster IP, /24 (multi-node only)
#
# Single-node runs attach no cluster NIC, so the MAC-matched NetworkManager
# connection below simply matches nothing and is ignored — harmless. Multi-node
# runs attach a second QEMU socket/mcast NIC with @@CLUSTER_MAC@@, which NM then
# pins to @@CLUSTER_IP@@ to form a shared cluster network across the VMs.
#
# Everything else (containerd, kubelet, control plane) is installed by the
# reconciler, exactly as on a real Magnum node.
variant: fcos
version: 1.5.0
passwd:
  users:
    - name: core
      groups: [sudo, wheel]
      ssh_authorized_keys:
        - "@@SSH_AUTHORIZED_KEY@@"
    - name: root
      ssh_authorized_keys:
        - "@@SSH_AUTHORIZED_KEY@@"
storage:
  files:
    - path: /etc/hostname
      mode: 0644
      overwrite: true
      contents:
        inline: "@@HOSTNAME@@"
    - path: /etc/sysctl.d/99-e2e.conf
      mode: 0644
      contents:
        inline: |
          fs.inotify.max_user_watches=1048576
          fs.inotify.max_user_instances=8192
    - path: /etc/ssh/sshd_config.d/30-e2e-root.conf
      mode: 0600
      contents:
        inline: |
          PermitRootLogin prohibit-password
          PubkeyAuthentication yes
    # Cluster network NIC (multi-node). Matched by MAC so interface naming does
    # not matter; ignored when no NIC carries this MAC (single-node).
    - path: /etc/NetworkManager/system-connections/cluster.nmconnection
      mode: 0600
      contents:
        inline: |
          [connection]
          id=cluster
          type=ethernet
          autoconnect=true
          [ethernet]
          mac-address=@@CLUSTER_MAC@@
          [ipv4]
          method=manual
          addresses=@@CLUSTER_IP@@/24
          may-fail=true
          [ipv6]
          method=ignore
# Nested AMD-V (Zen1) workaround kernel args. On this host the L2 guest's LAPIC
# interrupt delivery and kvm-clock are unreliable: the vCPU halts and is never
# woken (boot freezes, clock frozen), and device IRQs get lost. idle=poll keeps
# the vCPU running so it always takes the next tick; nox2apic uses the emulated
# legacy xAPIC; no-kvmclock + tsc=reliable fall back to a TSC that is stable with
# one vCPU; pci=nomsi forces devices onto legacy INTx (IOAPIC) interrupts, which
# are delivered when MSI-X is not (else the boot stalls waiting for the disk).
# Harmless on healthy hosts (idle=poll just busy-waits). Applied by Ignition on
# first boot (one extra reboot). Drop these once on a runner with sound nested
# virt (Zen2+/Intel/bare-metal).
kernel_arguments:
  should_exist:
    - idle=poll
    - nox2apic
    - no-kvmclock
    - tsc=reliable
    - pci=nomsi
