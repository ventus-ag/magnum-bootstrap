name: CI

# One pipeline for everything: a single `build` job compiles + unit-tests the
# reconciler and publishes the binary as an artifact; every heavier job depends
# on it and reuses that one binary instead of rebuilding. Downstream jobs run in
# parallel:
#
#   build  ──┬─▶ e2e-fcos              (single-master FCoS VM)
#            ├─▶ e2e-fcos-multimaster  (multi-master + LBs)
#            └─▶ e2e-openstack         (real OpenStack: smoke per-run, all nightly)
#
# The ventus cloud is self-hosted infra with no metered cost, so the FULL e2e
# suite (both FCoS VM tiers + the real-OpenStack tier) runs on EVERY push and
# pull_request — no opt-in labels. The only per-run/nightly split is the
# OpenStack SCENARIO: a fast `smoke` cluster on each push/PR, the full `all`
# sweep on the nightly schedule (and via workflow_dispatch os_scenario).
#
# NOTE: all these tiers run on a SINGLE self-hosted runner (magnum-actions01),
# so they SERIALIZE — a full run is the sum of the tiers, not the max. Add more
# self-hosted runners (or move e2e-openstack to a hosted runner) to parallelize.
# The FCoS VM tiers run on the self-hosted `ventus` runner; e2e-openstack needs
# OpenStack credentials. See e2e/README.md.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      kube_tag:
        description: Initial Kubernetes version
        default: v1.30.5
      kube_tag_upgrade:
        description: Upgrade target version
        default: v1.31.4
      scenarios:
        description: "Space-separated scenarios (create, scale-masters, ca-rotate, upgrade, periodic)"
        default: create ca-rotate upgrade periodic
      magnum_ref:
        description: Branch/ref of the forked driver repo (ventus-ag/magnum)
        default: stable/victoria
      use_host_provider:
        description: Run e2e-fcos against the real magnumhost Pulumi provider (instead of the legacy bridge)
        type: boolean
        default: false
      run_old_fcos:
        description: Also run the pinned pre-composefs FCoS image tier
        type: boolean
        default: false
      fcos_version:
        description: "Pinned FCoS build for the old-image tier (empty = default pre-composefs build)"
        default: ""
      masters:
        description: Multi-master node count (multimaster tier)
        default: "3"
      keep_cluster:
        description: Leave the OpenStack cluster in place after the run (debug)
        type: boolean
        default: false
      os_master_count_resize:
        description: "OpenStack tier: post-rotation master target (1->N). 0/empty = add a worker instead"
        default: "2"
      os_skip_upgrade:
        description: "OpenStack tier: skip the upgrade step (faster run)"
        type: boolean
        default: false
      os_skip_resize:
        description: "OpenStack tier: skip the pre-rotation worker resize step (faster run)"
        type: boolean
        default: false
      os_skip_post_rotate:
        description: "OpenStack tier: skip the post-rotation add-node + SA-consistency check"
        type: boolean
        default: false
      os_scenario:
        description: "OpenStack tier: scenario to run (all = curated default sweep)"
        type: choice
        default: all
        options:
          - all
          - smoke
          - multinode
          - chained-single
          - chained-multinode
          - ubuntu-upgrade
          - ubuntu-nodepool
          - component-toggle
          - version-ladder
          - sonobuoy
  schedule:
    - cron: "0 2 * * *" # nightly 02:00 UTC

permissions:
  contents: read

# Cancel superseded runs for the same PR/branch so VM jobs don't pile up.
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # build — the single source of the reconciler binary. Unit tests + lint gate
  # here, then dist/bootstrap is uploaded so every e2e job downloads it instead
  # of recompiling the ~105MB binary.
  # ---------------------------------------------------------------------------
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The forked driver supplies the real write-heat-params*.sh that the
      # heat-params contract guard (e2e/scenario) checks the renderer against.
      # Best-effort: on fork PRs the PAT is absent and the checkout is skipped,
      # so the guard self-skips rather than failing (same-repo PRs enforce it).
      - name: Checkout forked driver (for the heat-params contract guard)
        id: driver
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.MAGNUM_REPO || 'ventus-ag/magnum' }}
          ref: ${{ github.event.inputs.magnum_ref || vars.MAGNUM_REF || 'stable/victoria' }}
          path: magnum
          token: ${{ secrets.RW_PAT_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: gofmt
        run: |
          unformatted="$(gofmt -l $(git ls-files '*.go'))"
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt needed on:"; echo "$unformatted"; exit 1
          fi

      - name: Test
        run: |
          # Enforce the heat-params contract guard when the driver checkout
          # succeeded; otherwise the guard self-skips (see contract_test.go).
          driver="$GITHUB_WORKSPACE/magnum"
          if [ -d "$driver/magnum/drivers/common/templates/kubernetes/bootstrap" ]; then
            export MAGNUM_VICTORIA_DIR="$driver"
            echo "heat-params contract guard ENFORCED against $driver"
          else
            echo "::warning::driver checkout unavailable — heat-params contract guard will skip"
          fi
          go test ./...

      - name: Build release binaries (reconciler + magnumhost provider + openstack e2e)
        run: |
          # `make build` builds BOTH dist/bootstrap and the Pulumi host provider
          # plugin dist/pulumi-resource-magnumhost. Both are uploaded so the e2e
          # jobs reuse them (provider path is opt-in via USE_HOST_PROVIDER).
          make build VERSION=ci REPOSITORY=${{ github.repository }}
          # The real-OpenStack tier is a single static Go binary (gophercloud +
          # client-go, no openstack/kubectl CLIs); build it here and ship it in
          # the same artifact so e2e-openstack needs no toolchain on the runner.
          CGO_ENABLED=0 go build -trimpath -o dist/magnum-e2e ./e2e/cmd/magnum-e2e
          ls -lh dist/
          test -x dist/bootstrap
          test -x dist/pulumi-resource-magnumhost
          test -x dist/magnum-e2e

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bootstrap-dist
          path: |
            dist/bootstrap
            dist/pulumi-resource-magnumhost
            dist/magnum-e2e
          retention-days: 3
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # resolve — latest stable k8s, shared by the e2e matrices.
  # ---------------------------------------------------------------------------
  resolve:
    name: Resolve latest k8s
    needs: build
    runs-on: self-hosted
    outputs:
      latest: ${{ steps.k.outputs.latest }}
    steps:
      - id: k
        run: echo "latest=$(curl -fsSL https://dl.k8s.io/release/stable.txt)" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # e2e-fcos — single-master FCoS VM tier (matrix: pinned + latest k8s). Runs on
  # every push, pull_request, dispatch and nightly (no opt-in label). Reuses the
  # build artifact. Dispatch use_host_provider=true swaps the legacy hostresource
  # bridge for the real magnumhost Pulumi provider plugin.
  # ---------------------------------------------------------------------------
  e2e-fcos:
    name: e2e-fcos (${{ matrix.name }})
    needs: [build, resolve]
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: pinned
            kube_tag: ${{ github.event.inputs.kube_tag || 'v1.30.5' }}
            kube_tag_upgrade: ${{ github.event.inputs.kube_tag_upgrade || 'v1.31.4' }}
            scenarios: ${{ github.event.inputs.scenarios || 'create ca-rotate upgrade periodic' }}
            workers: 0
            # Distinct slot offset so this leg's subnet/mcast/host-ports never
            # collide with the concurrently-scheduled `latest` leg on a host
            # running multiple runner agents (see E2E_SLOT_OFFSET below).
            slot_offset: 0
          # One worker VM on the latest entry only (TCG makes each extra VM
          # expensive): without it the worker reconcile path (worker-certs,
          # kube-worker-config, registry) has ZERO per-PR coverage.
          - name: latest
            kube_tag: v1.31.4
            kube_tag_upgrade: ${{ needs.resolve.outputs.latest }}
            scenarios: ${{ github.event.inputs.scenarios || 'create ca-rotate upgrade periodic' }}
            workers: 1
            slot_offset: 1
    steps:
      - name: Checkout magnum-bootstrap
        uses: actions/checkout@v4

      - name: Checkout forked driver (ventus-ag/magnum)
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.MAGNUM_REPO || 'ventus-ag/magnum' }}
          ref: ${{ github.event.inputs.magnum_ref || vars.MAGNUM_REF || 'stable/victoria' }}
          path: magnum
          token: ${{ secrets.RW_PAT_TOKEN }}

      # Go is still needed for the tiny e2e helpers (mock-magnum/lb/heat,
      # scenario-gen) and the runner preflight; only the ~105MB reconciler is
      # reused from the build artifact.
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download prebuilt binaries
        uses: actions/download-artifact@v4
        with:
          name: bootstrap-dist
          path: ${{ runner.temp }}/prebuilt

      - name: Provision runner (idempotent self-config)
        if: ${{ vars.E2E_SELF_PROVISION != 'false' }}
        run: |
          sudo SKIP_GO=1 SKIP_PREFLIGHT=1 ./e2e/vm/runner-setup.sh
          sudo chmod 0666 /dev/kvm || true

      - name: Runner preflight
        run: ./e2e/vm/runner-preflight.sh

      - name: Run Fedora CoreOS e2e (${{ matrix.name }})
        env:
          VICTORIA_DIR: ${{ github.workspace }}/magnum
          PREBUILT_BOOTSTRAP: ${{ runner.temp }}/prebuilt/bootstrap
          PREBUILT_HOST_PROVIDER: ${{ runner.temp }}/prebuilt/pulumi-resource-magnumhost
          # Real magnumhost provider is opt-in (dispatch use_host_provider=true);
          # per-PR runs use the prod-default legacy hostresource bridge.
          USE_HOST_PROVIDER: ${{ github.event.inputs.use_host_provider || 'false' }}
          KUBE_TAG: ${{ matrix.kube_tag }}
          KUBE_TAG_UPGRADE: ${{ matrix.kube_tag_upgrade }}
          SCENARIOS: ${{ matrix.scenarios }}
          WORKERS: ${{ matrix.workers }}
          E2E_SLOT_OFFSET: ${{ matrix.slot_offset }}
          WORKDIR: ${{ runner.temp }}/fcos-e2e-${{ matrix.name }}
        run: |
          chmod +x "$PREBUILT_BOOTSTRAP" "$PREBUILT_HOST_PROVIDER" || true
          ./e2e/vm/run-fcos-e2e.sh

      - name: Upload diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fcos-e2e-${{ matrix.name }}-diag
          path: |
            ${{ runner.temp }}/fcos-e2e-${{ matrix.name }}/console.*.log
            ${{ runner.temp }}/fcos-e2e-${{ matrix.name }}/heat-params.*
            ${{ runner.temp }}/fcos-e2e-${{ matrix.name }}/ignition.*.json
          if-no-files-found: ignore

      - name: Clean up VMs and workdir
        if: always()
        run: |
          WD="${{ runner.temp }}/fcos-e2e-${{ matrix.name }}"
          pkill -f "$WD" 2>/dev/null || true
          sleep 2
          pkill -9 -f "$WD" 2>/dev/null || true
          rm -rf "$WD" || true

  # ---------------------------------------------------------------------------
  # e2e-fcos-oldimage — same single-master suite on a PINNED pre-composefs FCoS
  # build. Prod still runs the older image family; the per-PR tier only ever
  # tests the latest stable, so the "must work on both" claim needs this job.
  # Nightly + dispatch (run_old_fcos) only — TCG makes a third per-PR VM run
  # too expensive.
  # ---------------------------------------------------------------------------
  e2e-fcos-oldimage:
    name: e2e-fcos-oldimage
    needs: [build, resolve]
    runs-on: self-hosted
    if: >-
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.run_old_fcos == 'true')
    steps:
      - name: Checkout magnum-bootstrap
        uses: actions/checkout@v4

      - name: Checkout forked driver (ventus-ag/magnum)
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.MAGNUM_REPO || 'ventus-ag/magnum' }}
          ref: ${{ github.event.inputs.magnum_ref || vars.MAGNUM_REF || 'stable/victoria' }}
          path: magnum
          token: ${{ secrets.RW_PAT_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download prebuilt binaries
        uses: actions/download-artifact@v4
        with:
          name: bootstrap-dist
          path: ${{ runner.temp }}/prebuilt

      - name: Provision runner (idempotent self-config)
        if: ${{ vars.E2E_SELF_PROVISION != 'false' }}
        run: |
          sudo SKIP_GO=1 SKIP_PREFLIGHT=1 ./e2e/vm/runner-setup.sh
          sudo chmod 0666 /dev/kvm || true

      - name: Runner preflight
        run: ./e2e/vm/runner-preflight.sh

      - name: Run Fedora CoreOS e2e (pinned pre-composefs image)
        env:
          VICTORIA_DIR: ${{ github.workspace }}/magnum
          PREBUILT_BOOTSTRAP: ${{ runner.temp }}/prebuilt/bootstrap
          PREBUILT_HOST_PROVIDER: ${{ runner.temp }}/prebuilt/pulumi-resource-magnumhost
          USE_HOST_PROVIDER: "false"
          # Last pre-composefs stable build family (mutable /usr symlink
          # semantics, older glibc) — the image generation prod still runs.
          FCOS_VERSION: ${{ github.event.inputs.fcos_version || '38.20231027.3.2' }}
          KUBE_TAG: v1.30.5
          KUBE_TAG_UPGRADE: v1.31.4
          SCENARIOS: create ca-rotate upgrade periodic
          WORKDIR: ${{ runner.temp }}/fcos-e2e-oldimage
        run: |
          chmod +x "$PREBUILT_BOOTSTRAP" "$PREBUILT_HOST_PROVIDER" || true
          ./e2e/vm/run-fcos-e2e.sh

      - name: Upload diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fcos-e2e-oldimage-diag
          path: |
            ${{ runner.temp }}/fcos-e2e-oldimage/console.*.log
            ${{ runner.temp }}/fcos-e2e-oldimage/heat-params.*
            ${{ runner.temp }}/fcos-e2e-oldimage/ignition.*.json
          if-no-files-found: ignore

      - name: Clean up VMs and workdir
        if: always()
        run: |
          WD="${{ runner.temp }}/fcos-e2e-oldimage"
          pkill -f "$WD" 2>/dev/null || true
          sleep 2
          pkill -9 -f "$WD" 2>/dev/null || true
          rm -rf "$WD" || true

  # ---------------------------------------------------------------------------
  # e2e-fcos-multimaster — N masters + the two L4 LBs. Runs on every push,
  # pull_request, dispatch and nightly (no opt-in label). Reuses build.
  # ---------------------------------------------------------------------------
  e2e-fcos-multimaster:
    name: e2e-fcos-multimaster
    # Depends on e2e-fcos (not just build/resolve) so the 5-VM multi-master run
    # never shares the 8-vCPU box with the two concurrent single-master legs —
    # that would oversubscribe TCG and collapse etcd raft timing. It starts once
    # both single-master legs finish; the legs run concurrently, so this still
    # ends sooner than the old fully-serial pinned→latest→multimaster chain.
    needs: [build, resolve, e2e-fcos]
    runs-on: self-hosted
    # Non-blocking: multi-master etcd formation across 3 emulated VMs is flaky on
    # the TCG-only runner (nested AMD-V, no KVM — etcd raft heartbeat/election
    # timing collapses under emulation, ~30% fail), so a flake here must not
    # red-block a PR. It still runs and reports on every PR; the reliable
    # merge-blocking gates are e2e-fcos (single-master) + e2e-openstack (smoke).
    # Flip this off once a KVM-capable / bare-metal runner is available.
    continue-on-error: true
    steps:
      - name: Checkout magnum-bootstrap
        uses: actions/checkout@v4

      - name: Checkout forked driver (ventus-ag/magnum)
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.MAGNUM_REPO || 'ventus-ag/magnum' }}
          ref: ${{ github.event.inputs.magnum_ref || vars.MAGNUM_REF || 'stable/victoria' }}
          path: magnum
          token: ${{ secrets.RW_PAT_TOKEN }}

      # Go is still needed for the tiny e2e helpers (mock-magnum/lb/heat,
      # scenario-gen) and the runner preflight; only the ~105MB reconciler is
      # reused from the build artifact.
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download prebuilt binaries
        uses: actions/download-artifact@v4
        with:
          name: bootstrap-dist
          path: ${{ runner.temp }}/prebuilt

      - name: Provision runner (idempotent self-config)
        if: ${{ vars.E2E_SELF_PROVISION != 'false' }}
        run: |
          sudo SKIP_GO=1 SKIP_PREFLIGHT=1 ./e2e/vm/runner-setup.sh
          sudo chmod 0666 /dev/kvm || true

      - name: Runner preflight
        run: ./e2e/vm/runner-preflight.sh

      - name: Run multi-master Fedora CoreOS e2e
        env:
          VICTORIA_DIR: ${{ github.workspace }}/magnum
          PREBUILT_BOOTSTRAP: ${{ runner.temp }}/prebuilt/bootstrap
          MASTERS: ${{ github.event.inputs.masters || '3' }}
          WORKERS: "0"
          # scale-masters seeds master-0 (1-member etcd) then grows the control
          # plane 1 -> MASTERS one node at a time (each new master joins the
          # running cluster), asserting the etcd member count climbs each step;
          # ca-rotate then exercises the dual-CA barrier across the full batch.
          SCENARIOS: ${{ github.event.inputs.scenarios || 'scale-masters ca-rotate' }}
          KUBE_TAG: ${{ github.event.inputs.kube_tag || 'v1.30.5' }}
          KUBE_TAG_UPGRADE: ${{ github.event.inputs.kube_tag_upgrade || 'v1.31.4' }}
          # A stable per-run slot so this job's cluster network/ports never collide
          # with a concurrent single-master e2e on the same host.
          E2E_SLOT: "20"
          WORKDIR: ${{ runner.temp }}/fcos-e2e-mm
        run: |
          chmod +x "$PREBUILT_BOOTSTRAP"
          ./e2e/vm/run-fcos-e2e.sh

      - name: Upload diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fcos-e2e-mm-diag
          path: |
            ${{ runner.temp }}/fcos-e2e-mm/console.*.log
            ${{ runner.temp }}/fcos-e2e-mm/heat-params.*
            ${{ runner.temp }}/fcos-e2e-mm/ignition.*.json
          if-no-files-found: ignore

      - name: Clean up VMs and workdir
        if: always()
        run: |
          WD="${{ runner.temp }}/fcos-e2e-mm"
          pkill -f "$WD" 2>/dev/null || true
          sleep 2
          pkill -9 -f "$WD" 2>/dev/null || true
          rm -rf "$WD" || true

  # ---------------------------------------------------------------------------
  # e2e-openstack — real Magnum cluster on the ventus cloud. Runs on EVERY push,
  # pull_request, dispatch and nightly (no opt-in label): the cloud is
  # self-hosted infra with no metered cost, so every change is validated end to
  # end. Each push/PR runs a matrix of `smoke` + both multi-master scenarios
  # (`multimaster` = create-3, `multimaster-scale` = 1→3) — the real cloud is the
  # reliable multi-master gate the TCG FCoS tier cannot be. The full `all` sweep
  # runs on the nightly schedule (and a single scenario via dispatch os_scenario).
  #
  # Driven by the prebuilt `magnum-e2e` Go binary (gophercloud + client-go) from
  # the build artifact — no openstack/kubectl CLIs or clouds.yaml on the runner.
  # Auth is standard OS_* env (application credential preferred; user/password
  # also supported). The reconciler node binary itself is delivered to the nodes
  # via the reconciler_version/reconciler_binary_url labels (or the template
  # defaults), NOT this artifact.
  #
  # `needs: build` so it reuses this run's bootstrap-dist artifact
  # (use_prebuilt: true). The tier lives in the reusable e2e-openstack workflow,
  # which is ALSO independently runnable via its own workflow_dispatch
  # (Actions → e2e-openstack → Run workflow), decoupled from a full CI run.
  e2e-openstack:
    name: e2e-openstack (${{ matrix.scenario }})
    needs: [build]
    # Per-PR multi-master coverage: every push/PR runs smoke + BOTH multimaster
    # scenarios on the real cloud (reliable, unlike the TCG FCoS tier). The full
    # `all` sweep runs only nightly; a single scenario via workflow_dispatch. The
    # matrix legs serialize behind the reusable workflow's `e2e-openstack`
    # concurrency group + the single runner (one cluster at a time), and
    # CLUSTER_NAME/artifacts are scenario-tagged so they never collide.
    strategy:
      fail-fast: false
      matrix:
        scenario: ${{ fromJSON(github.event_name == 'schedule' && '["all"]' || (github.event_name == 'workflow_dispatch' && format('["{0}"]', github.event.inputs.os_scenario) || '["smoke","multimaster","multimaster-scale","sonobuoy"]')) }}
    uses: ./.github/workflows/e2e-openstack.yaml
    secrets: inherit
    with:
      use_prebuilt: true
      scenario: ${{ matrix.scenario }}
      keep_cluster: ${{ github.event.inputs.keep_cluster == 'true' }}
      os_master_count_resize: ${{ github.event.inputs.os_master_count_resize || '2' }}
      os_skip_upgrade: ${{ github.event.inputs.os_skip_upgrade == 'true' }}
      os_skip_resize: ${{ github.event.inputs.os_skip_resize == 'true' }}
      os_skip_post_rotate: ${{ github.event.inputs.os_skip_post_rotate == 'true' }}
