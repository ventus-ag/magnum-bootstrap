name: e2e-fcos

# Boots real Fedora CoreOS VMs on the self-hosted `ventus` runner and drives the
# reconciler through create -> ca-rotate -> upgrade against the actual
# magnum_victoria bootstrap pipeline. Self-contained: a mock Keystone/Magnum
# runs inside each VM, so no OpenStack is needed. OpenStack-integrated addons
# (OCCM, Cinder/Manila CSI) are off here — see e2e-openstack.yaml for those.

on:
  workflow_dispatch:
    inputs:
      kube_tag:
        description: Initial Kubernetes version
        default: v1.30.5
      kube_tag_upgrade:
        description: Upgrade target version
        default: v1.31.4
      scenarios:
        description: Space-separated scenarios
        default: create ca-rotate upgrade
      magnum_ref:
        description: Branch/ref of the forked driver repo (ventus-ag/magnum)
        default: victoria-ca-rotation
      workers:
        description: Number of worker nodes (0 = single-node master)
        default: "0"
      qemu_accel:
        description: QEMU accelerator (kvm = fast/needs nested virt; tcg = pure emulation, reliable but slow)
        default: kvm
      qemu_cpu:
        description: QEMU -cpu model (auto = host w/ 1 vCPU on nested AMD-V; or set EPYC / max / host / qemu64 for tcg)
        default: auto
      qemu_machine:
        description: QEMU -machine type (blank = qemu default/i440fx; try q35 if early boot hangs)
        default: ""
      qemu_irqchip:
        description: QEMU kernel-irqchip (blank = auto/off on nested AMD; set 'on' to force in-kernel or 'split' for userspace IOAPIC only)
        default: ""
      trigger:
        description: How the reconciler is invoked (direct = systemd unit; agent = real heat-container-agent + mock Heat)
        default: direct
      boot_retries:
        description: Extra VM boot attempts on a silent boot hang (blank = auto; 4 on nested AMD)
        default: ""
      boot_stall:
        description: Console-idle seconds that flag a silent boot hang and trigger a retry
        default: "120"
  schedule:
    - cron: "0 2 * * *" # nightly 02:00 UTC
  pull_request:
    # Opt-in per PR: add the 'e2e' label. Heavy (boots a real VM) and runs on a
    # self-hosted KVM runner, so it must not run on every push or on forks.
    types: [labeled, synchronize, reopened]
    branches: [main, master]

permissions:
  contents: read

# Cancel superseded runs for the same PR/branch so VM jobs don't pile up.
concurrency:
  group: e2e-fcos-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  resolve:
    # On PRs, only run when the 'e2e' label is present (also gates the e2e job
    # below via needs:). Always runs for dispatch / schedule.
    if: >-
      github.event_name != 'pull_request' ||
      contains(github.event.pull_request.labels.*.name, 'e2e')
    runs-on: self-hosted
    outputs:
      latest: ${{ steps.k.outputs.latest }}
    steps:
      - id: k
        name: Resolve latest stable Kubernetes
        run: echo "latest=$(curl -fsSL https://dl.k8s.io/release/stable.txt)" >> "$GITHUB_OUTPUT"

  e2e:
    needs: resolve
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: pinned
            kube_tag: ${{ github.event.inputs.kube_tag || 'v1.30.5' }}
            kube_tag_upgrade: ${{ github.event.inputs.kube_tag_upgrade || 'v1.31.4' }}
          - name: latest
            kube_tag: v1.31.4
            kube_tag_upgrade: ${{ needs.resolve.outputs.latest }}
    steps:
      - name: Checkout magnum-bootstrap
        uses: actions/checkout@v4

      - name: Checkout forked driver (ventus-ag/magnum)
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.MAGNUM_REPO || 'ventus-ag/magnum' }}
          ref: ${{ github.event.inputs.magnum_ref || vars.MAGNUM_REF || 'victoria-ca-rotation' }}
          path: magnum
          token: ${{ secrets.RW_PAT_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Provision runner (idempotent self-config)
        if: ${{ vars.E2E_SELF_PROVISION != 'false' }}
        run: |
          # Installs qemu/KVM/jq/podman + caches the FCoS image. Go comes from
          # setup-go above; this workflow runs its own preflight next.
          sudo SKIP_GO=1 SKIP_PREFLIGHT=1 ./e2e/vm/runner-setup.sh
          # The runner user was just added to the 'kvm' group, which won't apply
          # mid-session — open /dev/kvm for this job so qemu can use it now.
          sudo chmod 0666 /dev/kvm || true

      - name: Runner preflight
        run: ./e2e/vm/runner-preflight.sh

      - name: Run Fedora CoreOS e2e (${{ matrix.name }})
        env:
          VICTORIA_DIR: ${{ github.workspace }}/magnum
          KUBE_TAG: ${{ matrix.kube_tag }}
          KUBE_TAG_UPGRADE: ${{ matrix.kube_tag_upgrade }}
          SCENARIOS: ${{ github.event.inputs.scenarios || 'create ca-rotate upgrade' }}
          WORKERS: ${{ github.event.inputs.workers || '0' }}
          QEMU_ACCEL: ${{ github.event.inputs.qemu_accel || 'kvm' }}
          QEMU_CPU: ${{ github.event.inputs.qemu_cpu || 'auto' }}
          QEMU_MACHINE: ${{ github.event.inputs.qemu_machine || '' }}
          QEMU_IRQCHIP: ${{ github.event.inputs.qemu_irqchip || '' }}
          TRIGGER: ${{ github.event.inputs.trigger || 'direct' }}
          BOOT_RETRIES: ${{ github.event.inputs.boot_retries || '' }}
          BOOT_STALL_SECS: ${{ github.event.inputs.boot_stall || '120' }}
          WORKDIR: ${{ runner.temp }}/fcos-e2e-${{ matrix.name }}
        run: ./e2e/vm/run-fcos-e2e.sh

      - name: Upload diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fcos-e2e-${{ matrix.name }}-diag
          path: |
            ${{ runner.temp }}/fcos-e2e-${{ matrix.name }}/console.*.log
            ${{ runner.temp }}/fcos-e2e-${{ matrix.name }}/heat-params.*
            ${{ runner.temp }}/fcos-e2e-${{ matrix.name }}/ignition.*.json
          if-no-files-found: ignore

      - name: Clean up VMs and workdir
        if: always()
        run: |
          # Safety net for cancelled/killed jobs where run-fcos-e2e.sh's own EXIT
          # trap may not have run. Kill QEMU VMs scoped to THIS job's workdir (so
          # concurrent jobs/agents on the host are untouched), then drop the large
          # qcow2 overlays. Runs after the diagnostics upload above.
          WD="${{ runner.temp }}/fcos-e2e-${{ matrix.name }}"
          pkill -f "$WD" 2>/dev/null || true
          sleep 2
          pkill -9 -f "$WD" 2>/dev/null || true
          rm -rf "$WD" || true
