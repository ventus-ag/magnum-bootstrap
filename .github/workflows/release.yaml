name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build binary
        run: |
          make build VERSION=${{ steps.version.outputs.VERSION }} REPOSITORY=${{ github.repository }}

      - name: Generate checksums
        id: checksum
        run: |
          sha256sum dist/bootstrap > dist/bootstrap.sha256
          sha256sum dist/pulumi-resource-magnumhost > dist/pulumi-resource-magnumhost.sha256
          echo "BOOTSTRAP_SHA256=$(awk '{print $1}' dist/bootstrap.sha256)" >> "$GITHUB_OUTPUT"
          echo "HOST_PROVIDER_SHA256=$(awk '{print $1}' dist/pulumi-resource-magnumhost.sha256)" >> "$GITHUB_OUTPUT"

      - name: Verify binary runs
        run: |
          chmod +x dist/bootstrap dist/pulumi-resource-magnumhost
          ./dist/bootstrap --help
          test -x dist/pulumi-resource-magnumhost

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ steps.version.outputs.VERSION }}"
          generate_release_notes: true
          files: |
            dist/bootstrap
            dist/bootstrap.sha256
            dist/pulumi-resource-magnumhost
            dist/pulumi-resource-magnumhost.sha256
          body: |
            ## Reconciler Artifacts

            **Bootstrap download:**
            ```bash
            curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.VERSION }}/bootstrap -o bootstrap
            chmod +x bootstrap
            ```

            **Bootstrap SHA256:** `${{ steps.checksum.outputs.BOOTSTRAP_SHA256 }}`

            **Host provider download:**
            ```bash
            curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.VERSION }}/pulumi-resource-magnumhost -o pulumi-resource-magnumhost
            chmod +x pulumi-resource-magnumhost
            ```

            **Host provider SHA256:** `${{ steps.checksum.outputs.HOST_PROVIDER_SHA256 }}`

            **Verify bootstrap:**
            ```bash
            curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.VERSION }}/bootstrap.sha256 -o bootstrap.sha256
            sha256sum -c bootstrap.sha256
            ```

            **Verify host provider:**
            ```bash
            curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.VERSION }}/pulumi-resource-magnumhost.sha256 -o pulumi-resource-magnumhost.sha256
            sha256sum -c pulumi-resource-magnumhost.sha256
            ```

            **Default runtime behavior:**
            `bootstrap` now defaults to downloading `pulumi-resource-magnumhost`
            from the same GitHub release tag, so no extra provider env vars are
            required for tagged release builds.

            **Heat params:**
            ```
            RECONCILER_VERSION="${{ steps.version.outputs.VERSION }}"
            RECONCILER_BINARY_URL="https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.VERSION }}/bootstrap"
            RECONCILER_BINARY_URL_SHA256="${{ steps.checksum.outputs.BOOTSTRAP_SHA256 }}"
            ```
