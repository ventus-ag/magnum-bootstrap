name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ventus
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -ldflags="-s -w -X main.version=${{ steps.version.outputs.VERSION }}" \
            -trimpath -o bootstrap ./cmd/bootstrap

      - name: Generate checksums
        id: checksum
        run: |
          sha256sum bootstrap > bootstrap.sha256
          echo "SHA256=$(awk '{print $1}' bootstrap.sha256)" >> "$GITHUB_OUTPUT"

      - name: Verify binary runs
        run: |
          chmod +x bootstrap
          ./bootstrap --help

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ steps.version.outputs.VERSION }}"
          generate_release_notes: true
          files: |
            bootstrap
            bootstrap.sha256
          body: |
            ## Reconciler Binary

            **Download:**
            ```bash
            curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.VERSION }}/bootstrap -o bootstrap
            chmod +x bootstrap
            ```

            **SHA256:** `${{ steps.checksum.outputs.SHA256 }}`

            **Verify:**
            ```bash
            curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.VERSION }}/bootstrap.sha256 -o bootstrap.sha256
            sha256sum -c bootstrap.sha256
            ```

            **Heat params:**
            ```
            RECONCILER_VERSION="${{ steps.version.outputs.VERSION }}"
            RECONCILER_BINARY_URL="https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.VERSION }}/bootstrap"
            RECONCILER_BINARY_URL_SHA256="${{ steps.checksum.outputs.SHA256 }}"
            ```